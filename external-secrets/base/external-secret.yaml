apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: petclinic-test-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: petclinic-test-secret
    creationPolicy: Owner
  data:
    - secretKey: db-password
      remoteRef:
        key: petclinic/dev/db-password
