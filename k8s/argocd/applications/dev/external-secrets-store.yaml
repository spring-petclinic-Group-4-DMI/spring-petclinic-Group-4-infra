apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-store
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -11 — earliest. Applied before monitoring (-10) and before any
    # petclinic service that consumes generated K8s Secrets. Terraform has
    # already installed the ESO controller + CRDs; this app creates the
    # ClusterSecretStore and the petclinic-dev ExternalSecrets.
    argocd.argoproj.io/sync-wave: "-11"
spec:
  project: default

  source:
    repoURL: https://github.com/spring-petclinic-Group-4-DMI/spring-petclinic-Group-4-infra.git
    targetRevision: main
    path: k8s/base/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
