apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genai-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  sources:
    - repoURL: https://github.com/spring-petclinic-Group-4-DMI/spring-petclinic-Group-4-infra.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/spring-petclinic-Group-4-DMI/spring-petclinic-Group-4-infra.git
      targetRevision: main
      path: helm/petclinic-service
      helm:
        releaseName: genai-service
        valueFiles:
          - $values/helm-values/genai-service.yaml
          - $values/helm-values/dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
