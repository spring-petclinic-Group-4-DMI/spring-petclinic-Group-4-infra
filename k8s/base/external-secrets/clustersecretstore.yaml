# ClusterSecretStore — tells ESO where to fetch secrets from.
# Cluster-scoped (single resource shared by every namespace), pointing at AWS
# Secrets Manager in us-east-2. Auth uses the IRSA-bound service account that
# terraform's external-secrets module annotated with the role ARN.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: petclinic
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
