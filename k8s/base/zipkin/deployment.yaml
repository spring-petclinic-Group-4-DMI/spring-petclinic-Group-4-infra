apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: monitoring
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate    # in-memory storage; rolling update would lose all spans
  selector:
    matchLabels:
      app.kubernetes.io/name: zipkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zipkin
        app.kubernetes.io/part-of: petclinic
    spec:
      containers:
        - name: zipkin
          # Multi-arch image — pulls arm64 automatically on Graviton nodes.
          image: openzipkin/zipkin:3.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9411
              protocol: TCP
          env:
            - name: STORAGE_TYPE
              value: mem      # in-memory; spans lost on restart. OK for dev.
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx384m"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
