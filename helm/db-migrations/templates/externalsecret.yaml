{{- /*
  ExternalSecret — materialises rds-credentials in the same namespace as the
  Flyway Job. Without this template the Job would race the petclinic-service
  chart's ExternalSecret, and on a fresh deploy the Secret doesn't exist when
  db-migrations runs (wave -5) since petclinic services are at wave 2.

  The same secret is also created by the petclinic-service chart for the
  business services. Two ExternalSecrets pointing at the same K8s Secret name
  is a conflict — ESO will reconcile but log warnings. To avoid that, leave
  this template here (it's first by sync wave) and remove the duplicate from
  the petclinic-service chart, OR keep them all and accept the warning.
*/}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
  labels:
    app.kubernetes.io/name: db-migrations
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: petclinic
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rds-credentials
    # Reshape AWS SM's JSON (username/password/host/port/dbname) into Spring-
    # shaped env vars the Flyway Job picks up via envFrom.
    template:
      engineVersion: v2
      data:
        SPRING_DATASOURCE_USERNAME: "{{ `{{ .username }}` }}"
        SPRING_DATASOURCE_PASSWORD: "{{ `{{ .password }}` }}"
        SPRING_DATASOURCE_URL: "jdbc:mysql://{{ `{{ .host }}` }}:{{ `{{ .port }}` }}/{{ `{{ .dbname }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: petclinic/{{ .Values.global.environment }}/rds-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: petclinic/{{ .Values.global.environment }}/rds-credentials
        property: password
    - secretKey: host
      remoteRef:
        key: petclinic/{{ .Values.global.environment }}/rds-credentials
        property: host
    - secretKey: port
      remoteRef:
        key: petclinic/{{ .Values.global.environment }}/rds-credentials
        property: port
    - secretKey: dbname
      remoteRef:
        key: petclinic/{{ .Values.global.environment }}/rds-credentials
        property: dbname
