apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrations-{{ .Values.image.tag | default "init" }}
  labels:
    app.kubernetes.io/name: db-migrations
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    petclinic.io/environment: {{ .Values.global.environment }}
  annotations:
    # Treat as ArgoCD sync hook so it re-runs on every sync.
    # BeforeHookCreation deletes the old Job before creating the new one.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrations
        app.kubernetes.io/part-of: petclinic
    spec:
      restartPolicy: OnFailure
      # If rds-credentials Secret doesn't exist when the pod is scheduled,
      # kubelet keeps retrying until it appears. ArgoCD applies and waits for
      # the central ExternalSecret before this Job syncs.
      containers:
        - name: flyway
          image: "{{ .Values.image.registry }}/{{ .Values.image.envPrefix }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            # Map Spring-shaped env vars (created by ExternalSecret) to Flyway's
            # expected names. Flyway accepts FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD.
            - name: FLYWAY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SPRING_DATASOURCE_URL
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SPRING_DATASOURCE_USERNAME
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SPRING_DATASOURCE_PASSWORD
            - name: FLYWAY_CONNECT_RETRIES
              value: "{{ .Values.flyway.connectRetries }}"
            - name: FLYWAY_CONNECT_RETRIES_INTERVAL
              value: "{{ .Values.flyway.connectRetriesInterval }}"
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "{{ .Values.flyway.baselineOnMigrate }}"
            - name: FLYWAY_BASELINE_VERSION
              value: "{{ .Values.flyway.baselineVersion }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
