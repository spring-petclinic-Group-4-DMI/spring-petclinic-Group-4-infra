# Defaults for the db-migrations chart.
# Per-env overrides in helm-values/dev.yaml; CI writes image.tag in helm-values/db-migrations.yaml.

image:
  registry: "428101261622.dkr.ecr.us-east-2.amazonaws.com"
  envPrefix: "petclinic-dev"
  repository: "db-migrations"
  tag: ""    # CI writes here
  pullPolicy: IfNotPresent

# Flyway connect-retry params — RDS may not be reachable on the first try
# after cluster bootstrap.
flyway:
  connectRetries: 30
  connectRetriesInterval: 5
  # baselineOnMigrate lets Flyway run against a non-empty schema (e.g. tables
  # created by Hibernate ddl-auto before Flyway was wired in). Combined with
  # the IF NOT EXISTS / INSERT IGNORE statements in V*.sql, the first run is
  # idempotent: it creates flyway_schema_history, marks the baseline, then
  # applies V1..V6 — existing tables are skipped, missing ones (visits) get
  # created, seed data is inserted where rows are absent.
  baselineOnMigrate: true
  baselineVersion: "0"

# Job behaviour
job:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# Secret holding SPRING_DATASOURCE_URL / USERNAME / PASSWORD. It is
# materialised by k8s/base/external-secrets before this Job syncs.
secretName: rds-credentials

global:
  environment: dev
