replicaCount: 1
image:
  repository: 428101261622.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/admin-server
  pullPolicy: IfNotPresent
  tag: "latest"
service:
  type: ClusterIP
  port: 9090
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
configMap:
  SPRING_PROFILES_ACTIVE: kubernetes
  BPL_JVM_THREAD_COUNT: "50"
