{{- if .Values.secrets.rdsCredentials }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-credentials
  labels:
    {{- include "petclinic.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  target:
    name: rds-credentials
    # Reshape the AWS Secret (JSON: username/password/host/port/dbname) into
    # Spring-shaped env vars the deployment picks up via envFrom.
    template:
      engineVersion: v2
      data:
        SPRING_DATASOURCE_USERNAME: "{{ `{{ .username }}` }}"
        SPRING_DATASOURCE_PASSWORD: "{{ `{{ .password }}` }}"
        SPRING_DATASOURCE_URL: "jdbc:mysql://{{ `{{ .host }}` }}:{{ `{{ .port }}` }}/{{ `{{ .dbname }}` }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ include "petclinic.rdsSecretKey" . }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ include "petclinic.rdsSecretKey" . }}
        property: password
    - secretKey: host
      remoteRef:
        key: {{ include "petclinic.rdsSecretKey" . }}
        property: host
    - secretKey: port
      remoteRef:
        key: {{ include "petclinic.rdsSecretKey" . }}
        property: port
    - secretKey: dbname
      remoteRef:
        key: {{ include "petclinic.rdsSecretKey" . }}
        property: dbname
{{- end }}

{{- if .Values.secrets.openaiApiKey }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-api-key
  labels:
    {{- include "petclinic.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  target:
    name: openai-api-key
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ include "petclinic.openaiSecretKey" . }}
{{- end }}
