apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: spc-staging-ue1-iam-ro-eks-node
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "spc-stg-ue1-eks-main"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "spc-stg-ue1-eks-main"
  tags:
    Project: Spring PetClinic
    ManagedBy: Karpenter
---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
        - key: kubernetes.io/os
          operator: In
          values: [linux]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [spot, on-demand]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [c, m, r, t]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ['2']
  limits:
    cpu: 100
    memory: 400Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
