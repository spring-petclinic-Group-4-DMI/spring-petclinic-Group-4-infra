name: CI — Maven Build and Unit Tests
 
# ── TRIGGERS ─────────────────────────────────────────────────
# Runs on every push to any branch and every pull request.
# This means no broken code can reach staging or main.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - staging
      - main
 
# ── JOBS ─────────────────────────────────────────────────────
jobs:
  build-and-test:
    name: Build and Test All Services
    runs-on: ubuntu-latest
 
    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4
 
      # Step 2: Set up Java 17 (Spring Boot 3.x requires Java 17+)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
 
      # Step 3: Make the Maven wrapper executable
      - name: Make mvnw executable
        run: chmod +x mvnw
 
      # Step 4: Build all services and run all unit tests
      # -B = batch mode (no interactive prompts)
      # clean install = compile + test + package
      # If any single test fails the entire job fails
      - name: Build and run unit tests
        run: ./mvnw clean install -B
 
      # Step 5: Upload test results so GitHub shows them in the UI
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
