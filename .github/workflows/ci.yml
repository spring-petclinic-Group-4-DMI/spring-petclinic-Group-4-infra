name: CI - Infra Validation

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - staging
      - main

jobs:
  validate-helm:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint Helm charts
        run: |
          for chart in helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart..."
              helm lint "$chart"
            fi
          done

  validate-argocd:
    name: Validate ArgoCD Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate ArgoCD manifests are valid YAML
        run: |
          for file in argocd/applications/*.yaml \
                      argocd/projects/*.yaml; do
            echo "Validating $file..."
            python3 -c "import yaml, sys; yaml.safe_load(open('$file'))" \
              && echo "OK: $file" \
              || echo "FAILED: $file"
          done

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: |
          cd terraform/environments/staging
          terraform fmt -check -recursive || true

      - name: Terraform Init and Validate
        run: |
          cd terraform/environments/staging
          terraform init -backend=false
          terraform validate || true
