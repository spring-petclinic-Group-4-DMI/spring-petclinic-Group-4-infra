name: CI - Terraform Validate and Format

# TRIGGERS
# Runs on every push to any branch and every pull request targeting staging or main.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - staging
      - main

# JOBS
jobs:
  terraform-validate:
    name: Terraform Validate and Format Check
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Step 3: Check Terraform formatting across all files
      # -recursive checks all subdirectories
      # -check makes it fail if files are not formatted correctly
      - name: Terraform Format Check
        run: terraform fmt -recursive -check

      # Step 4: Validate the staging environment configuration
      # init -backend=false skips backend initialisation (no AWS credentials needed)
      - name: Terraform Init (staging)
        run: terraform init -backend=false
        working-directory: terraform/environments/staging

      - name: Terraform Validate (staging)
        run: terraform validate
        working-directory: terraform/environments/staging
