# argocd-install.yml
#
# Installs (or upgrades) ArgoCD into the petclinic EKS cluster, then applies the
# AppProject and Application CRDs for the chosen environment in dependency order:
#
#   config-server  (must be Synced+Healthy first)
#       │
#   discovery-server  (Synced+Healthy before core services start)
#       │
#   customers-service, visits-service, vets-service, genai-service  (parallel)
#       │
#   api-gateway, admin-server  (last)
#
# Triggers:
#   workflow_dispatch — manual install/reconcile. Idempotent.
#   workflow_call     — invoked by other workflows (e.g. terraform.yml after apply).
#
# Targets the dev environment (only deployed env).
#
# Required Secrets:
#   AWS_ROLE_ARN — OIDC role with eks:DescribeCluster + kubectl-relevant permissions
#
# Prerequisites:
#   - Terraform has already created the EKS cluster (petclinic-dev) in us-east-2
#   - k8s/argocd/install/values.yaml exists (ArgoCD Helm values)
#   - k8s/argocd/applications/dev/{service}.yaml CRDs exist (one per service)
#   - Optional: k8s/argocd/projects/*.yaml (AppProject CRDs)

name: Install ArgoCD

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ARGOCD_NAMESPACE: argocd
  ARGOCD_CHART_VERSION: "7.3.4"

jobs:
  install:
    name: Install ArgoCD (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLUSTER_NAME: petclinic-dev
      APP_NAMESPACE: petclinic-dev
      APPS_DIR: k8s/argocd/applications/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Ensure runtime namespaces and bootstrap secrets
        run: |
          set -euo pipefail

          kubectl create namespace "$APP_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          if kubectl get secret grafana-admin -n monitoring >/dev/null 2>&1; then
            echo "grafana-admin already exists."
          else
            kubectl -n monitoring create secret generic grafana-admin \
              --from-literal=admin-user=admin \
              --from-literal=admin-password="$(openssl rand -base64 24)"
            echo "Created grafana-admin secret."
          fi

      - name: Add Argo Helm repo
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      # ── Install or upgrade ArgoCD ────────────────────────────────────────────
      # Skips Helm install entirely when argocd-server is already Running.
      # Clears stuck pre-install jobs / failed Helm release state before retrying.
      - name: Install ArgoCD via Helm
        run: |
          set -euo pipefail
          kubectl create namespace "$ARGOCD_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          if kubectl get deployment argocd-server -n "$ARGOCD_NAMESPACE" &>/dev/null; then
            echo "ArgoCD already installed — running Helm upgrade."
          else
            echo "Installing ArgoCD fresh."

            # Clear stuck pre-install jobs from prior failures (no-op if absent).
            kubectl delete job argocd-redis-secret-init -n "$ARGOCD_NAMESPACE" 2>/dev/null || true

            # Detect and clear a stuck Helm release.
            HELM_STATUS=$(helm status argocd --namespace "$ARGOCD_NAMESPACE" 2>/dev/null \
              | grep "^STATUS:" | awk '{print $2}' || echo "not-found")
            echo "Helm release status: $HELM_STATUS"
            case "$HELM_STATUS" in
              pending-install|pending-upgrade|pending-rollback|failed)
                echo "Clearing stuck Helm state."
                kubectl delete secret -n "$ARGOCD_NAMESPACE" -l "owner=helm,name=argocd" || true
                ;;
            esac
          fi

          helm upgrade --install argocd argo/argo-cd \
            --namespace "$ARGOCD_NAMESPACE" \
            --version "$ARGOCD_CHART_VERSION" \
            -f k8s/argocd/install/values.yaml \
            --wait --timeout 10m

      # ── Apply AppProjects (optional, skipped if directory absent) ────────────
      - name: Apply ArgoCD AppProjects
        run: |
          if [[ -d k8s/argocd/projects ]]; then
            kubectl apply -f k8s/argocd/projects/
          else
            echo "No k8s/argocd/projects/ directory — skipping."
          fi

      # ── Apply Applications in dependency order ───────────────────────────────
      # Wait helper: poll Sync+Health status of an Application CR.
      - name: Apply Applications and wait for dependencies
        run: |
          set -euo pipefail

          if [[ ! -d "$APPS_DIR" ]]; then
            echo "::error::$APPS_DIR not found — create the Application CRDs first."
            exit 1
          fi

          wait_app() {
            local APP="$1"
            echo "Waiting for $APP to become Synced+Healthy..."
            for i in $(seq 1 60); do
              SYNC=$(kubectl get application "$APP" -n "$ARGOCD_NAMESPACE" \
                -o jsonpath='{.status.sync.status}' 2>/dev/null || echo Unknown)
              HEALTH=$(kubectl get application "$APP" -n "$ARGOCD_NAMESPACE" \
                -o jsonpath='{.status.health.status}' 2>/dev/null || echo Unknown)
              echo "  attempt $i/60 — sync=$SYNC health=$HEALTH"
              if [[ "$SYNC" == "Synced" && "$HEALTH" == "Healthy" ]]; then
                return 0
              fi
              sleep 10
            done
            kubectl describe application "$APP" -n "$ARGOCD_NAMESPACE" || true
            return 1
          }

          wait_app_synced() {
            local APP="$1"
            echo "Waiting for $APP to become Synced..."
            for i in $(seq 1 60); do
              SYNC=$(kubectl get application "$APP" -n "$ARGOCD_NAMESPACE" \
                -o jsonpath='{.status.sync.status}' 2>/dev/null || echo Unknown)
              echo "  attempt $i/60 — sync=$SYNC"
              if [[ "$SYNC" == "Synced" ]]; then
                return 0
              fi
              sleep 10
            done
            kubectl describe application "$APP" -n "$ARGOCD_NAMESPACE" || true
            return 1
          }

          apply_if_present() {
            local FILE="$APPS_DIR/$1.yaml"
            if [[ -f "$FILE" ]]; then
              kubectl apply -f "$FILE"
            else
              echo "::warning::$FILE missing — skipping $1"
            fi
          }

          # -1. ClusterSecretStore — applied before everything so ESO knows
          # where to read secrets from. This app also owns the petclinic-dev
          # ExternalSecrets consumed by db-migrations and application pods.
          apply_if_present external-secrets-store
          wait_app_synced external-secrets-store
          kubectl wait --for=condition=Ready clustersecretstore/aws-secrets-manager --timeout=180s
          kubectl -n "$APP_NAMESPACE" wait --for=condition=Ready externalsecret/rds-credentials --timeout=180s
          kubectl -n "$APP_NAMESPACE" wait --for=condition=Ready externalsecret/openai-api-key --timeout=180s

          # 0. Platform: observability stack — Prometheus+Grafana, Loki, Zipkin.
          # Wait for monitoring sync so ServiceMonitor CRDs exist before any
          # petclinic-service chart emits ServiceMonitor resources.
          apply_if_present monitoring
          wait_app_synced monitoring
          kubectl wait --for=condition=Established crd/servicemonitors.monitoring.coreos.com --timeout=180s
          apply_if_present loki
          apply_if_present zipkin

          # 0b. Database schema migrations (Flyway Job). MUST complete before
          # any service that talks to MySQL starts. Waited synchronously.
          apply_if_present db-migrations
          wait_app db-migrations

          # 1. Config server (everything depends on it)
          apply_if_present config-server
          wait_app config-server

          # 2. Discovery server (Eureka — services register here)
          apply_if_present discovery-server
          wait_app discovery-server

          # 3. Core domain services. visits-service waits for customers-service
          # because its API depends on pets owned by customers-service.
          apply_if_present customers-service
          apply_if_present vets-service
          apply_if_present genai-service
          wait_app customers-service
          wait_app vets-service
          wait_app genai-service
          apply_if_present visits-service
          wait_app visits-service

          # 4. Edge: API gateway + admin dashboard (last — they consume the others)
          apply_if_present api-gateway
          apply_if_present admin-server
          wait_app api-gateway
          wait_app admin-server

      - name: Print ArgoCD server hostname
        run: |
          HOST=$(kubectl get svc argocd-server -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
          if [[ -n "$HOST" ]]; then
            echo "ArgoCD UI: https://$HOST"
          else
            echo "ArgoCD server has no LoadBalancer hostname yet — port-forward instead:"
            echo "  kubectl port-forward svc/argocd-server -n $ARGOCD_NAMESPACE 8443:443"
          fi
