name: Install ArgoCD

on:
  workflow_dispatch:
  push:
    branches: [staging]
    paths:
      - "argocd/install/**"
      - ".github/workflows/argocd-install.yml"  # manual trigger only — you run this once

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: spc-stg-ue1-eks-main

jobs:
  install-argocd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Verify Kubernetes access
        run: |
          kubectl cluster-info
          kubectl auth can-i create namespace
          kubectl get nodes


      - name: Add Argo Helm repo
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --version 7.3.4 \
            -f argocd/install/values.yaml \
            --wait

      - name: Apply AppProject and Applications
        run: |
          kubectl apply -f argocd/projects/
          kubectl apply -f argocd/applications/

      - name: Print ArgoCD UI URL
        run: |
          kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'