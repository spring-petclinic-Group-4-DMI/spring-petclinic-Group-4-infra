name: Install ArgoCD

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: spc-stg-ue1-eks-main

jobs:
  install-argocd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Verify Kubernetes access
        run: |
          kubectl cluster-info
          kubectl auth can-i create namespace
          kubectl get nodes


      - name: Add Argo Helm repo
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

          # If ArgoCD server is already running, skip Helm install entirely
          if kubectl get deployment argocd-server -n argocd &>/dev/null; then
            echo "ArgoCD already deployed — skipping Helm install"
          else
            echo "ArgoCD not found — running fresh install"

            # Clean up any stuck pre-install jobs from a previous failed attempt
            kubectl delete job argocd-redis-secret-init -n argocd 2>/dev/null || true

            # Clear any stuck or failed Helm release state
            HELM_STATUS=$(helm status argocd --namespace argocd 2>/dev/null | grep "^STATUS:" | awk '{print $2}' || echo "not-found")
            echo "Helm release status: $HELM_STATUS"
            if [[ "$HELM_STATUS" == "pending-install" || "$HELM_STATUS" == "pending-upgrade" || "$HELM_STATUS" == "pending-rollback" || "$HELM_STATUS" == "failed" ]]; then
              echo "Clearing stuck Helm state..."
              kubectl delete secret -n argocd -l "owner=helm,name=argocd" || true
            fi

            helm upgrade --install argocd argo/argo-cd \
              --namespace argocd \
              --version 7.3.4 \
              -f argocd/install/values.yaml \
              --wait --timeout 10m
          fi

      - name: Apply AppProject and Applications in dependency order
        run: |
          wait_app() {
            APP_NAME="$1"
            echo "Waiting for $APP_NAME to become Synced and Healthy..."
            for i in $(seq 1 60); do
              SYNC=$(kubectl get application "$APP_NAME" -n argocd \
                -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
              HEALTH=$(kubectl get application "$APP_NAME" -n argocd \
                -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
              echo "Attempt $i/60 — $APP_NAME sync=$SYNC health=$HEALTH"
              if [[ "$SYNC" == "Synced" && "$HEALTH" == "Healthy" ]]; then
                return 0
              fi
              sleep 10
            done
            kubectl describe application "$APP_NAME" -n argocd || true
            return 1
          }

          kubectl apply -f argocd/projects/

          kubectl apply -f argocd/applications/db-migrations.yaml
          wait_app db-migrations

          kubectl apply \
            -f argocd/applications/config-server.yaml \
            -f argocd/applications/discovery-server.yaml
          wait_app config-server
          wait_app discovery-server

          kubectl apply \
            -f argocd/applications/customers-service.yaml \
            -f argocd/applications/vets-service.yaml \
            -f argocd/applications/visits-service.yaml \
            -f argocd/applications/genai-service.yaml
          wait_app customers-service
          wait_app vets-service
          wait_app visits-service
          wait_app genai-service

          kubectl apply \
            -f argocd/applications/api-gateway.yaml \
            -f argocd/applications/admin-server.yaml \
            -f argocd/applications/frontend.yaml

      - name: Print ArgoCD UI URL
        run: |
          kubectl get svc argocd-server -n argocd \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
