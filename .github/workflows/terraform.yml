name: Terraform

on:
  workflow_dispatch:
  push:
    branches: [staging]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_environment: staging
  TF_VAR_environment_code: stg
  TF_VAR_aws_region: us-east-1
  TF_VAR_region_code: ue1
  TF_VAR_github_org: spring-petclinic-Group-4-DMI
  TF_VAR_project_code: spc
  TF_VAR_repository_prefix: spring-petclinic
  TF_VAR_cluster_name: spc-stg-ue1-eks-main
  TF_VAR_secret_component: app
  TF_VAR_secret_resource_name: secret
  TF_VAR_secret_resource_count: "01"
  TF_VAR_secret_description: "Application secrets for staging environment"
  TF_VAR_create_secret_version: "true"
  TF_VAR_db_name: petclinic
  TF_VAR_db_instance_class: db.t3.micro
  TF_VAR_db_allocated_storage: 20
  TF_VAR_staging_alb_name: spc-stg-ue1-alb-external
  TF_VAR_domain_name: pawscare.online
  TF_VAR_app_namespace: petclinic-staging
  TF_VAR_api_gateway_service_name: api-gateway
  TF_VAR_api_gateway_service_port: 8080
  TF_VAR_lb_controller_chart_version: "1.7.1"
  TF_VAR_prod_alb_name: spc-prod-ue1-alb-external
  TF_VAR_create_prod_records: "false"
  TF_VAR_default_tags: '{}'
  TF_VAR_additional_secret_values: '{}'

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/staging

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set Terraform vars from GitHub Secrets
        run: |
          echo "TF_VAR_aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" >> $GITHUB_ENV
          echo "TF_VAR_mysql_username=${{ secrets.MYSQL_USERNAME }}" >> $GITHUB_ENV
          echo "TF_VAR_mysql_password=${{ secrets.MYSQL_PASSWORD }}" >> $GITHUB_ENV
          echo "TF_VAR_openai_api_key=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (phase 1 — AWS infra only)
        run: |
          terraform plan -out=tfplan1 \
            -target=module.iam \
            -target=module.vpc \
            -target=module.ecr \
            -target=module.app_secrets \
            -target=module.eks \
            -target=module.rds \
            -target=module.dns \
            -target=module.karpenter

      - name: Terraform apply (phase 1 — AWS infra only)
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
        run: terraform apply -auto-approve tfplan1

      - name: Terraform plan (phase 2 — Kubernetes resources + ALB)
        run: |
          terraform plan -out=tfplan2 \
            -target=kubernetes_namespace.app

      - name: Terraform apply (phase 2 — Kubernetes resources + ALB)
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
        run: terraform apply -auto-approve tfplan2

      - name: Update kubeconfig
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.TF_VAR_cluster_name }} \
            --region ${{ env.TF_VAR_aws_region }}

      - name: Create database credentials secret
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
        run: |
          kubectl create secret generic db-credentials \
            --namespace=${{ env.TF_VAR_app_namespace }} \
            --from-literal=username=${{ secrets.MYSQL_USERNAME }} \
            --from-literal=password=${{ secrets.MYSQL_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

  # ── Job 2: Install ArgoCD via reusable workflow ────────────────────────────
  install-argocd:
    needs: terraform
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
    uses: ./.github/workflows/argocd-install.yml
    secrets: inherit

  # ── Job 3: Wait for Flyway migration ──────────────────────────────────────
  wait-for-migrations:
    needs: install-argocd
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.TF_VAR_cluster_name }} \
            --region ${{ env.TF_VAR_aws_region }}

      - name: Wait for Flyway migration to complete
        run: |
          echo "Waiting for ArgoCD to create the flyway-migrate job..."
          for i in $(seq 1 30); do
            if kubectl get job flyway-migrate \
              --namespace=${{ env.TF_VAR_app_namespace }} > /dev/null 2>&1; then
              echo "Job found. Waiting for completion..."
              break
            fi
            echo "Attempt $i/30 — job not yet created, retrying in 10s..."
            sleep 10
          done

          kubectl wait job/flyway-migrate \
            --for=condition=complete \
            --namespace=${{ env.TF_VAR_app_namespace }} \
            --timeout=300s

     # - name: Terraform destroy
     #   if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' && github.ref == 'refs/heads/staging'
     #   run: terraform destroy -auto-approve
