# ── Server ────────────────────────────────────────────────────
server:
  service:
    type: LoadBalancer      # creates an AWS NLB so the UI is publicly accessible
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
  extraArgs:
    - --insecure

# ── Configs ───────────────────────────────────────────────────
configs:
  params:
    server.insecure: "true"  # must match --insecure flag above

  cm:
    url: "https://pawscare.online"

  repositories:
    infra-repo:
      url: https://github.com/spring-petclinic-Group-4-DMI/spring-petclinic-Group-4-infra.git
      name: infra-repo
      type: git
