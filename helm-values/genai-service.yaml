# GenAI Service — needs OPENAI_API_KEY. No DB by default (spec says optional).

image:
  service: genai-service
  tag: "b24ca12"
containerPort: 8084
service:
  port: 8084
probes:
  initialDelaySeconds: 180
  failureThreshold: 12
springProfiles:
  - docker
# Flip mysql.enabled + secrets.rdsCredentials on if you decide to back genai with RDS.
mysql:
  enabled: false
secrets:
  rdsCredentials: false
  openaiApiKey: true # binds petclinic/{env}/openai-api-key → OPENAI_API_KEY env
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done"]
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z discovery-server 8761; do echo waiting for discovery-server; sleep 2; done"]
# Expose /actuator/prometheus to the kube-prometheus-stack ServiceMonitor selector.
metrics:
  enabled: true
