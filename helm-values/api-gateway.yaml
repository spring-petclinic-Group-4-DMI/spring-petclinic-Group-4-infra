# API Gateway — public-facing, fronted by ALB. Starts after config + discovery.

image:
  service: api-gateway
  tag: ""

containerPort: 8080
service:
  port: 8080

springProfiles:
  - docker

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done"]
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z discovery-server 8761; do echo waiting for discovery-server; sleep 2; done"]

# Only api-gateway exposes ingress. Override host in helm-values/{env}.yaml once DNS is in place.
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
  host: ""        # set in helm-values/{env}.yaml when domain is configured
  path: /
  pathType: Prefix

# Expose /actuator/prometheus to the kube-prometheus-stack ServiceMonitor selector.
metrics:
  enabled: true
