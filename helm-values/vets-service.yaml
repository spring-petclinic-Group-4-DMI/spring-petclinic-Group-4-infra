# Vets Service — owns vets/specialties tables. Uses Caffeine cache.

image:
  service: vets-service
  tag: "6b231f6"
containerPort: 8083
service:
  port: 8083
springProfiles:
  - docker
mysql:
  enabled: true
secrets:
  rdsCredentials: true
env:
  - name: SPRING_SQL_INIT_MODE
    value: never
  - name: ZIPKIN_ENDPOINT
    value: http://zipkin.monitoring.svc.cluster.local:9411/api/v2/spans
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done"]
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z discovery-server 8761; do echo waiting for discovery-server; sleep 2; done"]
# Expose /actuator/prometheus to the kube-prometheus-stack ServiceMonitor selector.
metrics:
  enabled: true
