# Customers Service — owns owners + pets + types tables.

image:
  service: customers-service
  tag: "6b231f6"
containerPort: 8081
service:
  port: 8081
springProfiles:
  - docker
mysql:
  enabled: true # adds "mysql" profile
secrets:
  rdsCredentials: true # binds petclinic/{env}/rds-credentials → SPRING_DATASOURCE_*
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done"]
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z discovery-server 8761; do echo waiting for discovery-server; sleep 2; done"]
# Expose /actuator/prometheus to the kube-prometheus-stack ServiceMonitor selector.
metrics:
  enabled: true
