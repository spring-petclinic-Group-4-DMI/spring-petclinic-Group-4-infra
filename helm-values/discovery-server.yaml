# Discovery Server (Eureka) — starts second, after config-server is reachable.

image:
  service: discovery-server
  tag: ""

containerPort: 8761
service:
  port: 8761

springProfiles:
  - docker

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done"]
