# Visits Service — owns the visits table. FK on pets(id) from customers-service.

image:
  service: visits-service
  tag: "6b231f6"
containerPort: 8082
service:
  port: 8082
springProfiles:
  - docker
mysql:
  enabled: true
secrets:
  rdsCredentials: true
# Wait for upstream deps. customers-service starts first so the pets table FK
# exists before visits schema init runs (Spring auto-initialises on startup).
initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done"]
  - name: wait-for-discovery-server
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z discovery-server 8761; do echo waiting for discovery-server; sleep 2; done"]
  - name: wait-for-customers-service
    image: busybox:1.36
    command: ["sh", "-c", "until nc -z customers-service 8081; do echo waiting for customers-service; sleep 2; done"]
# Expose /actuator/prometheus to the kube-prometheus-stack ServiceMonitor selector.
metrics:
  enabled: true
